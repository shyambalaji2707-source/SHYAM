<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEC Login Portal</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#b30000,#ff4d4d);
}

.login-box{
    width:380px;
    background:#fff;
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    text-align:center;
}

.logo{
    width:120px;
    height:auto;
    margin-bottom:15px;
}

h2{
    color:#b30000;
    margin-bottom:8px;
    font-size:24px;
}

p{
    color:#555;
    margin-bottom:25px;
    font-size:14px;
}

.input-box{
    margin-bottom:18px;
    text-align:left;
}

.input-box label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
    color:#333;
}

.input-box input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

.input-box input:focus{
    border-color:#b30000;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    background:#b30000;
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:17px;
    cursor:pointer;
}

button:hover{
    background:#800000;
}

.footer{
    margin-top:20px;
    color:#666;
    font-size:13px;
}
</style>

</head>

<body>

<div class="login-box">

    <!-- College Logo -->
    <img src="logo.png" alt="College Logo" class="logo">

    <h2>Adhiparasakthi Engineering College</h2>

    <p>Student Login Portal</p>

    <form>

        <div class="input-box">
            <label>User ID</label>
            <input type="text" placeholder="Enter User ID" required>
        </div>

        <div class="input-box">
            <label>Password</label>
            <input type="password" placeholder="Enter Password" required>
        </div>

        <button type="submit">Login</button>

    </form>

    <div class="footer">
        Study • Spirituality • Service
    </div>

</div>

</body>
</html>
