<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEC Student Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#8B0000,#E53935);
}

.login-box{
    width:400px;
    background:white;
    border-radius:15px;
    padding:30px;
    text-align:center;
    box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.logo{
    width:120px;
    height:120px;
    object-fit:contain;
    margin-bottom:15px;
}

h2{
    color:#8B0000;
    margin-bottom:5px;
}

p{
    color:#666;
    margin-bottom:20px;
}

.input-group{
    text-align:left;
    margin-bottom:15px;
}

.input-group label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

.input-group input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    background:#8B0000;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#600000;
}

.footer{
    margin-top:20px;
    color:#555;
    font-size:13px;
}
</style>

</head>
<body>

<div class="login-box">

    <!-- College Logo -->
    <img src="logo.png" class="logo" alt="College Logo">

    <h2>Adhiparasakthi Engineering College</h2>

    <p>Student Login Portal</p>

    <form>

        <div class="input-group">
            <label>User ID</label>
            <input type="text" placeholder="Enter User ID" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="Enter Password" required>
        </div>

        <button type="submit">Login</button>

    </form>

    <div class="footer">
        Study • Spirituality • Service
    </div>

</div>

</body>
</html>
